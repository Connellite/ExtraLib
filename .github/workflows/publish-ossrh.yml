# Publishes to Maven Central via Central Portal OSSRH Staging API (see pom.xml release profile URLs).
# Use a Central Portal User Token: https://central.sonatype.com/usertoken — legacy OSSRH tokens cause 401.
# Repository secrets (Settings → Secrets and variables → Actions):
#   OSSRH_USERNAME — Portal token username
#   OSSRH_PASSWORD — Portal token password
#   MAVEN_GPG_PRIVATE_KEY — ASCII-armored private key (full block including BEGIN/END)
#   MAVEN_GPG_PASSPHRASE — passphrase for that key
#
# One-time: register namespace io.github.connellite at https://central.sonatype.com/ and create user token.

name: Publish Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # setup-java reads OSSRH_* when writing ~/.m2/settings.xml; they must exist before that step, not only on mvn deploy.
    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy to OSSRH
        run: mvn -B -ntp -P release deploy
