# Publishes to Maven Central via org.sonatype.central:central-publishing-maven-plugin (Portal bundle upload).
# Token: https://central.sonatype.com/usertoken — settings server id must be "central" (see setup-java server-id below).
# Repository secrets (Settings → Secrets and variables → Actions):
#   OSSRH_USERNAME — Portal token username (name kept for backward compatibility)
#   OSSRH_PASSWORD — Portal token password
#   MAVEN_GPG_PRIVATE_KEY — ASCII-armored private key (full block including BEGIN/END)
#   MAVEN_GPG_PASSPHRASE — passphrase for that key
#
# GPG public key on a keyserver (required — without it Central reports:
#   "Could not find a public key by the key fingerprint"):
#   gpg --list-secret-keys --keyid-format LONG
#   gpg --keyserver keys.openpgp.org --send-keys YOUR_FULL_KEY_ID
#   # also supported: keyserver.ubuntu.com, pgp.mit.edu — see
#   # https://central.sonatype.org/publish/requirements/gpg/
# Wait a few minutes after send-keys before redeploying. If you sign with a subkey only,
# use the primary signing key per Sonatype (same page, "Delete a Sub Key").
#
# One-time: register namespace io.github.connellite at https://central.sonatype.com/ and create user token.

name: Publish Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # setup-java reads OSSRH_* when writing ~/.m2/settings.xml; they must exist before that step, not only on mvn deploy.
    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy to Maven Central
        run: mvn -B -ntp -P release deploy
